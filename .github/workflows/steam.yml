# Reusable workflow: build a steam-wrap game for all three platforms and
# (on v* tags) upload it to Steam. Call it from your game repo:
#
#   name: Steam
#   on:
#     push:
#       tags: ['v*']
#     workflow_dispatch:
#   jobs:
#     steam:
#       uses: alexanderthurn/steam-wrap/.github/workflows/steam.yml@main
#       secrets: inherit
#
# Required repo secrets for the deploy step (build-only works without them):
#   STEAM_USERNAME, STEAM_CONFIG_VDF, STEAM_APP_ID, STEAM_RELEASE_BRANCH

name: Steam Build & Deploy

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing the game's package.json
        type: string
        default: '.'
      deploy:
        description: Upload to Steam on v* tags
        type: boolean
        default: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
          - os: macos-latest
            target: mac
          - os: ubuntu-latest
            target: linux
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - run: npx steam-wrap build ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ inputs.working-directory }}/dist-electron/${{ matrix.target }}/

  deploy-steam:
    needs: build
    if: inputs.deploy && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: steam-builds

      - name: Publish to Steam
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          appId: ${{ secrets.STEAM_APP_ID }}
          buildDescription: "${{ github.ref_name }} (GitHub Action)"
          releaseBranch: ${{ secrets.STEAM_RELEASE_BRANCH }}
          depot1Path: steam-builds/win
          depot2Path: steam-builds/mac
          depot3Path: steam-builds/linux
